name: Coverage

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  CARGO_TERM_COLOR: always

jobs:
  coverage:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends libacl1-dev

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Generate coverage report
        run: cargo llvm-cov --workspace --all-features --lcov --output-path lcov.info

      - name: Enforce overall coverage
        run: |
          awk -F: '
            $1 == "LF" { lines += $2 }
            $1 == "LH" { hits += $2 }
            END {
              if (lines == 0) {
                print "No LCOV line coverage found" > "/dev/stderr"
                exit 1
              }
              coverage = 100 * hits / lines
              printf "Overall LCOV line coverage: %.2f%% (%d/%d)\n", coverage, hits, lines
              if (coverage < 90) exit 1
            }
          ' lcov.info

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          disable_search: true
          fail_ci_if_error: true
          files: lcov.info
          use_oidc: true
