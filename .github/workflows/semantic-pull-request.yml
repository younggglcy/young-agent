name: Semantic Pull Request

on:
  # This follows Vite's setup: pull_request_target is safe here because this
  # workflow only reads the PR title and never checks out or executes PR code.
  pull_request_target:
    types:
      - opened
      - edited
      - synchronize
      - reopened

jobs:
  main:
    if: github.repository == 'younggglcy/young-agent'
    runs-on: ubuntu-latest
    name: Semantic Pull Request
    permissions:
      pull-requests: read
    steps:
      - name: Validate PR title
        uses: amannn/action-semantic-pull-request@48f256284bd46cdaab1048c3721360e808335d50 # v6
        with:
          headerPattern: '^(?:revert: )?(\w+)(?:\((.+)\))?!?: (.{1,50})$'
          headerPatternCorrespondence: type, scope, subject
          types: |
            feat
            fix
            docs
            style
            refactor
            perf
            test
            build
            ci
            chore
          subjectPattern: '^(?![A-Z])(?!.*\.$).+$'
          subjectPatternError: |
            The subject "{subject}" found in the pull request title "{title}"
            didn't match the configured pattern. Please ensure that the subject
            is 1-50 characters, doesn't start with an uppercase character, and
            doesn't end with a dot.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
