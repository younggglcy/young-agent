schema_version = 1

[capability]
id = "coding"
version = "0.1.0"
name = "Coding Capability"
description = "Built-in tools for reading, searching, patching, and validating a local workspace."

[[tools]]
name = "read_file"
description = "Read a UTF-8 file inside the workspace boundary."
safety_class = "always_allow"

[tools.input_schema]
type = "object"
additionalProperties = false
required = ["path"]

[tools.input_schema.properties.path]
type = "string"

[tools.mcp]
server = "builtin-coding"
tool_name = "read_file"
protocol_version = "reserved"

[[tools]]
name = "search_files"
description = "Search for literal text inside UTF-8 workspace files."
safety_class = "always_allow"

[tools.input_schema]
type = "object"
additionalProperties = false
required = ["query"]

[tools.input_schema.properties.query]
type = "string"

[tools.input_schema.properties.path]
type = "string"

[tools.mcp]
server = "builtin-coding"
tool_name = "search_files"
protocol_version = "reserved"

[[tools]]
name = "apply_patch"
description = "Apply a unified diff to UTF-8 files inside the workspace boundary; displaced originals are reported in a search- and Git-ignored recovery namespace until the caller removes them."
safety_class = "requires_approval"
safety_reason = "patching mutates workspace files"

[tools.input_schema]
type = "object"
additionalProperties = false
required = ["patch"]

[tools.input_schema.properties.patch]
type = "string"

[tools.mcp]
server = "builtin-coding"
tool_name = "apply_patch"
protocol_version = "reserved"

[[tools]]
name = "run_command"
description = "Run an unmodified shell command in a workspace-bound foreground process group; request termination of tracked background and same-group residuals when the foreground shell exits, and confirm inherited tracking-token closure before reaping the leader. Descendants that deliberately close tracking descriptors, detach, or change credentials remain outside the portable tracking contract."
safety_class = "call_dependent"

[tools.input_schema]
type = "object"
additionalProperties = false
required = ["command"]

[tools.input_schema.properties.command]
type = "string"

[tools.mcp]
server = "builtin-coding"
tool_name = "run_command"
protocol_version = "reserved"
