[workspace]
members = [
    "crates/model-runtime",
    "crates/agent-runtime",
    "crates/tool-runtime",
    "crates/event-store",
    "crates/capability-coding",
    "crates/agent-cli",
]
resolver = "2"

[workspace.package]
version = "0.1.0"
edition = "2021"
repository = "https://github.com/younggglcy/young-agent"

[workspace.lints.rust]
unsafe_code = "forbid"
